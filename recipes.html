<style>
    .recipes-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 35px;
        padding: 25px;
        max-width: 1200px;
        margin: 0 auto;

    }



    /* Recipe Card Shared Styles */
    .recipe {
        height: 400px;
        border-radius: 40px;
        padding: 25px;
        margin-top: -20px;

        box-shadow: 0px 0px 2px white;
        background-size: 400px 500px;
        background-repeat: no-repeat;
        color: white;
        text-shadow: 0px 0px 3px black;
    }

    .recipe:hover {
        transform: translateY(-5px);
    }

    /* Recipe Card Buttons */
    .recipe a {
        margin-top: auto;
        align-self: center;
        margin-top: 250px;

        margin-left: 10PX;
        padding: 10px 30px;
        text-align: center;
        border-radius: 20px;

        color: #dcb8a0;
        font-size: 16px;
        font-family: 'Times New Roman', Times, serif;
        text-decoration: none;
        display: inline-block;
    }

    .recipe a:hover {
        transform: translateY(-5px);
    }



    #maindish {
        background-image: url(maindish/Main-dish.jfif);

        background-position: center;
        background-size: cover;
    }

    #bakery {
        background-image: url(bakeryimages/bakery1.jpeg);

        background-position: center;
        background-size: cover;
    }

    #healthy-food {
        background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.4)),
            url('Healthy_images/healthy-salad.jpg');

        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    #drinks {
        background-image: url(drinksimages/drink.jpeg);
        background-position: center;
        background-size: cover;
    }

    #appetizers {
        background-image: url(appetizersimgs/main1.jpg);

        background-size: cover;
    }

    #dessert {
        background-image: url(dessertimages/cover.jpg);
        background-position: center;
        background-size: cover;
    }
</style>

<div class="page-wrapper">
    <div class="edit-card">
        <h1>Edit Recipe 📝</h1>
        <hr>
        <form action="/update" method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <label>Recipe Name</label>
                    <input type="text" name="recipe_name" value="Salad" class="form-input" required>
                </div>

                <div class="form-group">
                    <label>Course Type</label>
                    <select name="course_name" class="form-input">
                        <option>Main-Course</option>
                        <option selected>Appetizers</option>
                        <option>Dessert</option>
                    </select>
                </div>
            </div>

            <div class="ingredients-section">
                <h3>Ingredients</h3>
                <div class="ingredient-row">
                    <input type="text" name="ing1" value="Lettuce" placeholder="Ingredient" class="form-input">
                    <input type="text" name="qty1" value="1 cup" placeholder="Quantity" class="form-input">
                </div>
                <div class="ingredient-row">
                    <input type="text" name="ing2" value="Tomato" placeholder="Ingredient" class="form-input">
                    <input type="text" name="qty2" value="1" placeholder="Quantity" class="form-input">
                </div>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="4" class="form-input">Cut vegetables and mix with olive oil and lemon juice.</textarea>
            </div>

            <button type="submit" class="btn-main">Update Recipe</button>
        </form>
    </div>
</div>

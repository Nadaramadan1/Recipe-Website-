<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yummy - Login</title>
    <link rel="stylesheet" href="Style.css"><style>
        
    </style>
</head>
<body style="background-color: #f2e7df; text-align: center;">
    <div id="navbar" >
        <nav class="main-nav">
            <div class="logo" >Yummy </div>
            <ul class="nav-links">
                  <li><a href="cover.html">Team</a></li>
                <li><a href="home.html">Home</a></li>
                <li><a href="search.html">Search</a></li>
                <li><a href="favorites.html">Favorites</a></li>
                <li><a href="admin-recipe.html">Admin</a></li>
                <li><a href="add-recipe.html">Add Recipe</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="signup.html">Sign Up</a></li>
            </ul>
        </nav>
    </div>
    <div class ="login-page-wrapper">
        <h1 class="welcome-msg">Welcome Back to YUMMY! 😊</h1>

        <div class="login-container">
            <div class="login-image">
                <img src="photos/login.jpg" alt="Delicious Food">
            </div>

            <div class="form-section">
                <form action="home.html" method="GET">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" class="form-input" required placeholder="Enter your username" name="user">
                    </div>
                    <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-input" placeholder="Min 5 characters" name="password" required minlength="5" maxlength="8">
                    </div> 
                    <div class="form-group" >
                        <label>Type of User</label>
                        <select class="form-input" name="user_type">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn-main" href="home.html">Login</button>
                    </div>
                    <div class = "Signup-link">
                        <span>Don't have an account? <a href="signup.html">Sign Up</a></span>
                    </div>
                </form>
            </div>
        </div>                
    </div>

    <main>  
    </main>
</body>
</html>

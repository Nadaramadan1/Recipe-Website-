<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Yummy - Login</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>

<body style="background-color: #f2e7df; text-align: center;">

    <!-- Navbar -->
    <div id="navbar">
        <nav class="main-nav">
            <div class="logo">Yummy</div>
            <ul class="nav-links">
                <li><a href="cover.html">Team</a></li>
                <li><a href="index.html">Home</a></li>
                <li><a href="search.html">Search</a></li>
                <li><a href="favorites.html">Favorites</a></li>
                <li><a href="pages/admin/admin-recipe.html">Admin</a></li>
                <li><a href="pages/admin/add-recipe.html">Add Recipe</a></li>
                <li><a href="pages/auth/login.html">Login</a></li>
                <li><a href="pages/auth/signup.html">Sign Up</a></li>
            </ul>
        </nav>
    </div>

    <!-- Login Section -->
    <div class="login-page-wrapper">
        <h1 class="welcome-msg">Welcome Back to YUMMY! 😊</h1>

        <div class="login-container">

            <div class="login-image">
                <img src="photos/login.jpg" alt="Food">
            </div>

            <div class="form-section">
                <!-- ✅ مهم: مفيش action -->
                <form id="loginForm">

                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" class="form-input" name="user" required placeholder="Enter your username">
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="form-input" name="password" required minlength="5"
                            placeholder="Enter your password">
                    </div>

                    <div class="form-group">
                        <label>Type of User</label>
                        <select class="form-input" name="user_type">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-main">Login</button>

                    <div class="Signup-link">
                        <span>Don't have an account? <a href="signup.html">Sign Up</a></span>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            let form = document.getElementById("loginForm");

            form.addEventListener("submit", function (e) {
                e.preventDefault();

                let username = document.querySelector('input[name="user"]').value;
                let password = document.querySelector('input[name="password"]').value;
                let userType = document.querySelector('select[name="user_type"]').value;

                let storedUser = localStorage.getItem(username);

                if (!storedUser) {
                    alert("User not found ❌");
                    return;
                }

                let userData = JSON.parse(storedUser);

                if (userData.password === password) {

                    alert("Login successful ✅");

                    localStorage.setItem("loggedInUser", username);

                    if (userType === "admin") {
                        window.location.href = "admin-recipe.html";
                    } else {
                        window.location.href = "index.html";
                    }

                } else {
                    alert("Wrong password ❌");
                }

            });

        });
    </script>

</body>

</html>

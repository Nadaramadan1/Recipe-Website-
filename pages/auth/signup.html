<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Yummy - Sign Up</title>
    <meta name="description" content="This is our Recipes Finder Website!">
    <link rel="stylesheet" href="../../src/css/style.css">
</head>

<body style="background-color: #f2e7df; text-align: center;">

    <!-- Navbar -->
    <div id="navbar">
        <nav class="main-nav">
            <div class="logo">Yummy</div>
            <ul class="nav-links">
                <li><a href="cover.html">Team</a></li>
                <li><a href="index.html">Home</a></li>
                <li><a href="search.html">Search</a></li>
                <li><a href="favorites.html">Favorites</a></li>
                <li><a href="pages/admin/admin-recipe.html">Admin</a></li>
                <li><a href="pages/admin/add-recipe.html">Add Recipe</a></li>
                <li><a href="pages/auth/login.html">Login</a></li>
                <li><a href="pages/auth/signup.html">Sign Up</a></li>
            </ul>
        </nav>
    </div>

    <!-- Sign Up Section -->
    <div class="signup-page-wrapper">
        <h1 class="welcome-msg">Welcome to YUMMY! 😊</h1>

        <div class="signup-container">

            <div class="signup-image">
                <img src="photos/signup.jpg" alt="Food">
            </div>

            <div class="form-section">
                <form id="signupForm">

                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" class="form-input" name="user" required placeholder="Enter your username">
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="form-input" name="password" required minlength="5"
                            placeholder="Min 5 characters">
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" class="form-input" name="confirm_password" required
                            placeholder="Confirm password">
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" class="form-input" name="email" placeholder="Enter your email">
                    </div>

                    <button type="submit" class="btn-main">Create Account</button>

                    <div class="Login-link">
                        <span>Already have an account? <a href="login.html">Login</a></span>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            let form = document.getElementById("signupForm");

            form.addEventListener("submit", function (e) {
                e.preventDefault();

                let username = document.querySelector('input[name="user"]').value;
                let password = document.querySelector('input[name="password"]').value;
                let confirmPassword = document.querySelector('input[name="confirm_password"]').value;
                let email = document.querySelector('input[name="email"]').value;

                if (!username || !password || !confirmPassword) {
                    alert("Please fill all required fields ❗");
                    return;
                }

                if (password !== confirmPassword) {
                    alert("Passwords do not match ❌");
                    return;
                }

                if (localStorage.getItem(username)) {
                    alert("This username is already taken ❌\nPlease choose another one.");
                    document.querySelector('input[name="user"]').focus()
                    return;
                }

                let userData = {
                    password: password,
                    email: email
                };

                localStorage.setItem(username, JSON.stringify(userData));

                alert("Account created successfully ✅");

                window.location.href = "login.html";
            });

        });
    </script>

</body>

</html>

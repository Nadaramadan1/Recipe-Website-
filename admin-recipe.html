    function displayRecipes() {
        const tableBody = document.getElementById('recipeTableBody');
        
        // Get existing recipes from storage or use manual ones if storage is empty
        let storedRecipes = JSON.parse(localStorage.getItem('recipes'));
        
        if (!storedRecipes || storedRecipes.length === 0) {
            localStorage.setItem('recipes', JSON.stringify(recipes));
            storedRecipes = recipes;
        }

        let rowsHTML = "";
        storedRecipes.forEach((recipe, index) => {
            rowsHTML += `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${recipe.name}</strong></td>
                    <td>${recipe.course}</td>
                    <td class="actions-cell">
                        <button class="btn-admin btn-view-mod" onclick="viewRecipe('${recipe.id}')">View</button>
                        <button class="btn-admin btn-edit-mod" onclick="editRecipe('${recipe.id}')">Edit</button>
                        <button class="btn-admin btn-delete-mod" onclick="deleteRecipe('${recipe.id}')">Delete</button>
                    </td>
                </tr>`;
        });
        tableBody.innerHTML = rowsHTML;
    }


    function editRecipe(id) {
        window.location.href = `edit-recipe.html?id=${id}`;
    }

    function deleteRecipe(id) {
        if (confirm("Are you sure you want to delete this recipe?")) {
            let recipes = JSON.parse(localStorage.getItem('recipes'));
            recipes = recipes.filter(r => r.id !== id);
            localStorage.setItem('recipes', JSON.stringify(recipes));
            displayRecipes(); // Refresh the table
        }
    }

    
    


   function viewRecipe(id) {
   
   const allRecipes = JSON.parse(localStorage.getItem('recipes')) || recipes;
    const recipe = allRecipes.find(r => r.id === id);
    
    if (!recipe) {
        console.error("Recipe not found ID:", id);
        return;
    }
   
    const categoryPages = {
        "appetizers": "appetizers.html",
        "dessert": "dessert.html",
        "maindish/beef": "beef.html",
        "maindish/chicken": "chicken.html",
        "maindish/pasta": "pasta.html",
        "maindish/fastfood": "fastfood.html",
        "maindish/seafood": "seafood.html",
        "maindish/Vegetarian": "Vegetarian.html",
        "Bakery/Bread": "Bread.html",
        "Bakery/Croissant": "Croissants.html",
        "Bakery/Cinnamon": "Cinnamons.html",
        "Bakery/Cookies": "cookies.html",
        "Bakery/Donuts": "Donuts.html",
        "Bakery/Macarons": "macrons.html",
        "Drinks/coffee": "coffee.html",
        "Drinks/fresh juices& smoothie": "juices.html",
        "Drinks/Hot drinks": "hot-drinks.html"
    };

    // 3. استخراج اسم الصفحة بناءً على الـ Course
    // سنبحث عن أول كلمة مطابقة في الـ course الخاص بالوصفة
    let targetPage = "home.html"; // صفحة افتراضية في حال لم نجد تطابقاً
    const courseLower = recipe.course.toLowerCase();    
    for (let key in categoryPages) {
        if (courseLower.includes(key)) {
            targetPage = categoryPages[key];
            break; 
        }
    }
    window.location.href = targetPage + "?id=" + id;
}

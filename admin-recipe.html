<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yummy - Admin Recipes</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <div id="navbar">
        <nav class="main-nav">
            <div class="logo">Yummy 🍲</div>
            <ul class="nav-links">
                <li><a href="cover.html">Team</a></li>
                <li><a href="home.html">Home</a></li>
                <li><a href="search.html">Search</a></li>
                <li><a href="favorites.html">Favorites</a></li>
                <li><a href="admin-recipe.html">Admin</a></li>
                <li><a href="add-recipe.html">Add Recipe</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="signup.html">Sign Up</a></li>
            </ul>
        </nav>
    </div>

    <div class="page-wrapper" style="display: block; text-align: center;">
        <h1>Recipe Management Portal</h1>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Recipe Name</th>
                    <th>Course</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="recipeTableBody">
                </tbody>
        </table>
    </div>

    <script>
        // 1. Static Recipes List (All your original recipes)
        const staticRecipes = [
            // Main Dishes
            { id: "BeefSteakcard", name: "Beef Steak 🥩", course: "maindish/beef" },
            { id: "BeefTacoscard", name: "Beef Tacos 🌮", course: "maindish/beef" },
            { id: "BeefStewcard", name: "Beef Stew 🍲", course: "maindish/beef" },
            { id: "FriedChickencard", name: "Fried Chicken 🍗", course: "maindish/chicken" },
            { id: "ChickenCurrycard", name: "Chicken Curry 🍛", course: "maindish/chicken" },
            { id: "GrilledChickencard", name: "Grilled Chicken 🍗", course: "maindish/chicken" },
            { id: "SpaghettiCarbonaracard", name: " Spaghetti Carbonara 🍝", course: "maindish/pasta" },
            { id: "PastaPestocard", name: "Pasta Pesto 🌿", course: "maindish/pasta" },
            { id: "Lasagnacard", name: "Lasagna 🍲", course: "maindish/pasta" },
            { id: "GrilledSalmoncard", name: "Grilled Salmon 🐟", course: "maindish/seafood" },
            { id: "ShrimpPastacard", name: "Shrimp Pasta 🍤", course: "maindish/seafood" },
            { id: "FishCurrycard", name: "Fish Curry 🐠", course: "maindish/seafood" },
            { id: "Burgercard", name: " Burger 🍔", course: "maindish/fastfood" },
            { id: "FrenchFriescard", name: "French Fries 🍟", course: "maindish/fastfood" },
            { id: "Pizzacard", name: "Pizza 🍕", course: "maindish/fastfood" },
            { id: "VeggieStir-Frycard", name: "Veggie Stir-Fry 🥗", course: "maindish/Vegetarian" },
            { id: "VegetableCurrycard", name: "Vegetable Curry 🍛", course: "maindish/Vegetarian" },
            { id: "QuinoaSaladcard", name: "Quinoa Salad 🥗", course: "maindish/Vegetarian" },
            
            // Healthy
            { id: "grilled_salmon_avocadocard", name: "Grilled Salmon & Avocado", course: "Healthy" },
            { id: "quinoa_buddha_bowlcard", name: "Quinoa Buddha Bowl", course: "Healthy" },
            { id: "lemon_herb_chickencard", name: "Lemon Herb Chicken", course: "Healthy" },
            { id: "zucchini_noodlescard", name: "Zucchini Noodles (Zoodles)", course: "Healthy" },

            // Bakery
            { id: "Baguettecard", name: "Classic French Baguette 🥖", course: "Bakery/Bread" },
            { id: "Sourdoughcard", name: "Natural Sourdough 🥐", course: "Bakery/Bread" },
            { id: "Focacciacard", name: "Herbed Focaccia 🍪", course: "Bakery/Bread" },
            { id: "ButterCroissantcard", name: "Butter Croissant", course: "Bakery/Croissant" },
            { id: "PainauChocolatcard", name: "Pain au Chocolat", course: "Bakery/Croissant" },
            { id: "ClassicCinnamoncard", name: "Classic Cinnamon Rolls", course: "Bakery/Cinnamon" },
            { id: "ChocolateCookiescard", name: "Chocolate Cookies 🍪", course: "Bakery/Cookies" },
            { id: "GlazedDonutscard", name: "Glazed Donuts 🍩", course: "Bakery/Donuts" },
            { id: "VanillaMacaronscard", name: "Vanilla Macarons", course: "Bakery/Macarons" },

            // Dessert
            { id: "tiramisucard", name: "Tiramisu ☕", course: "Dessert" },
            { id: "browniecard", name: "Brownies 🍫", course: "Dessert" },
            { id: "CremeCaramelcard", name: "Crème Caramel 🍮", course: "Dessert" },

            // Appetizers
            { id: "DeviledEggscard", name: "Deviled Eggs", course: "appetizers" },
            { id: "ChickenWingscard", name: "Chicken Wings", course: "appetizers" },
            { id: "ShrimpCocktailcard", name: "Shrimp Cocktail", course: "appetizers" },

            // Drinks
            { id: "Cappuccinocard", name: "French Vanilla Cappuccino", course: "Drinks/coffee" },
            { id: "icedcoffeecard", name: "Caramel Hazelnut Iced Coffee", course: "Drinks/coffee" },
            { id: "Smoothiecard", name: "Berry Blast Smoothie🍸", course: "Drinks/fresh juices& smoothie" },
            { id: "turkish-teacard", name: "Turkish Tea🍃", course: "Drinks/Hot drinks" }
        ];

        // Function to render the table
        function displayRecipes() {
            const tableBody = document.getElementById('recipeTableBody');
            
            // 2. Fetch recipes added by the user from localStorage
            let userAddedRecipes = JSON.parse(localStorage.getItem('recipes')) || [];

            // 3. Combine both lists (Static + User Added)
            let allRecipes = [...staticRecipes];
            userAddedRecipes.forEach(userRecipe => {
                // Prevent duplicate IDs if the user adds something already in static
                if (!staticRecipes.some(s => s.id === userRecipe.id)) {
                    allRecipes.push(userRecipe);
                }
            });

            let rowsHTML = "";
            allRecipes.forEach((recipe, index) => {
                rowsHTML += `
                    <tr>
                        <td>${index + 1}</td>
                        <td><strong>${recipe.name}</strong></td>
                        <td>${recipe.course}</td>
                        <td class="actions-cell">
                            <button class="btn-admin btn-view-mod" onclick="viewRecipe('${recipe.id}', '${recipe.course}')">View</button>
                            <button class="btn-admin btn-edit-mod" onclick="editRecipe('${recipe.id}')">Edit</button>
                            <button class="btn-admin btn-delete-mod" onclick="deleteRecipe('${recipe.id}')">Delete</button>
                        </td>
                    </tr>`;
            });
            tableBody.innerHTML = rowsHTML;
        }

        // View Function: This focuses on the target page and the specific card
        function viewRecipe(id, course) {
            const categoryPages = {
                "appetizers": "appetizers.html",
                "dessert": "dessert.html",
                "healthy": "Healthy Food.html",
                "maindish/beef": "beef.html",
                "maindish/chicken": "chicken.html",
                "maindish/pasta": "pasta.html",
                "maindish/fastfood": "fastfood.html",
                "maindish/seafood": "seafood.html",
                "maindish/vegetarian": "Vegetarian.html",
                "bakery/bread": "Bread .html",
                "bakery/croissant": "Croissants .html",
                "bakery/cookies": "cookies.html",
                "drinks/coffee": "coffee.html",
                "drinks/fresh juices& smoothie": "juices.html",
                "drinks/hot drinks": "hot-drinks.html"
            };

            let targetPage = "home.html";
            const courseLower = course.toLowerCase();
            
            for (let key in categoryPages) {
                if (courseLower.includes(key.toLowerCase())) {
                    targetPage = categoryPages[key];
                    break;
                }
            }

            // Remove 'card' from ID if your card anchors don't use it
            let cleanId = id.toLowerCase().endsWith('card') ? id.substring(0, id.length - 4) : id;
            window.location.href = `${targetPage}#${cleanId}`;
        }

        // Delete Function: Safety check for static recipes
        function deleteRecipe(id) {
            const isStatic = staticRecipes.some(r => r.id === id);
            
            if (isStatic) {
                alert("This is a core website recipe and cannot be deleted.");
                return;
            }

            if (confirm("Delete this user-added recipe?")) {
                let userList = JSON.parse(localStorage.getItem('recipes')) || [];
                userList = userList.filter(r => r.id !== id);
                localStorage.setItem('recipes', JSON.stringify(userList));
                displayRecipes();
            }
        }

        function editRecipe(id) {
            window.location.href = `edit-recipe.html?id=${id}`;
        }

        // Initialize table on load
        displayRecipes();
    </script>
</body>
</html>

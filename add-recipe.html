    <meta charset="UTF-8">

</head>

<body>
    <div id="navbar">

        <nav class="main-nav">
            <div class="logo">Yummy 🍲</div>
            <ul class="nav-links">
                <li><a href="cover.html">Team</a></li>
                <li><a href="home.html">Home</a></li>

            </ul>
        </nav>
    </div>

    <div class="page-wrapper">
        <div class="add-recipe-card">
            <h1>Add New Recipe</h1>
            <form>
                <div class="form-row">
                    <label for="recipe id">Recipe ID:</label>
                    <input id="recipe id" type="number" name="id" required>
                </div>

                <div class="form-row">
                    <label for="recipe name">Recipe Name:</label>
                    <input id="recipe name" type="text" name="name" required>
                </div>

                <div class="form-row">
                    <label for="dish type">Select Dish Type:</label>
                    <select id="dish type" name="course" required>
                        <option value="appetizers">Appetizers</option>
                        <option value="main-course">Main-course</option>
                        <option value="dessert">Dessert</option>
                    </select>
                </div>

                <hr>
                <h2>Ingredients</h2>

                <div class="ingredient-group">
                    <label>ID:</label> <input type="number" name="ingredient id" required>
                    <label>Name:</label> <input type="text" name="ingredient name" required>
                    <label>Qty:</label> <input type="text" name="ingredient quantity" required>
                </div>

                <div class="ingredient-group">
                    <label>ID:</label> <input type="number" name="ingredient id" required>
                    <label>Name:</label> <input type="text" name="ingredient name" required>
                    <label>Qty:</label> <input type="text" name="ingredient quantity" required>
                </div>

                <div class="ingredient-group">
                    <label>ID:</label> <input type="number" name="ingredient id" required>
                    <label>Name:</label> <input type="text" name="ingredient name" required>
                    <label>Qty:</label> <input type="text" name="ingredient quantity" required>
                </div>

                <hr>
                <div class="description-section">
                    <label for="discription">Recipe Description:</label>
                    <textarea rows="5" name="discription" id="discription"></textarea>
                </div>

                <div class="form-actions">
                    <input type="submit" value="Add Recipe" class="btn-main">
                    <input type="reset" value="Reset" class="btn-main" style="background: #ccc; border: none;">
                </div>
            </form>
        </div>
    </div>
</body>

</html>

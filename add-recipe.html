     <h1>Add New Recipe</h1>
     <form>
        <label for="recipe id">Recipe ID:</label><br/>
        <input id="recipe id" type="number" name="id" required><br/>

        <label for ="recipe name">Recipe Name:</label><br/>
        <input id="recipe name" type="text" name="name" required><br/>

        <label for="dish type"> Select Dish Type:</label><br/>
        <select id="dish type" name="course" required>
          <option value="appetizers">appetizers</option>
          <option value="main course">main course</option>
          <option value="dessert">dessert</option>
        </select>
        
      
             <h2>Ingredients</h2>

        <div>
              <label for="ingredient id1">Ingredient ID:</label> 
              <input id="ingredient id1" type="number" name="ingredient id" required>

              <label for="ingredient name1">Ingredient Name:</label>
              <input id="ingredient name1" type="text" name="ingredient name" required>

              <label for="ingredient quantity1">Ingredient Quantity:</label>
              <input id="ingredient quantity1" type="text" name="ingredient quantity" required>
        </div>

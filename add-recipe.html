<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Yummy - Add Recipe</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>
    <div id="navbar">
        <nav class="main-nav">
            <div class="logo">Yummy 🍲</div>
            <ul class="nav-links">
                <li><a href="cover.html">Team</a></li>
                <li><a href="home.html">Home</a></li>
                <li><a href="search.html">Search</a></li>
                <li><a href="favorites.html">Favorites</a></li>
                <li><a href="admin-recipe.html">Admin</a></li>
                <li><a href="add-recipe.html">Add Recipe</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="signup.html">Sign Up</a></li>
            </ul>
        </nav>
    </div>

    <div class="page-wrapper">
        <div class="add-recipe-card">
            <h1>Add New Recipe</h1>
            <form id="recipe-form">
                <div class="form-row">
                    <label for="recipe_id">Recipe ID:</label>
                    <input id="recipe_id" type="number" name="id" required>
                </div>

                <div class="form-row">
                    <label for="recipe_name">Recipe Name:</label>
                    <input id="recipe_name" type="text" name="name" required>
                </div>

                <div class="form-row">
                    <label for="dish_type">Select Dish Type:</label>
                    <select id="dish_type" name="course" required>
                        <option value="healthy">Healthy Food</option>
                        <option value="appetizers">Appetizers</option>
                        <option value="main-course">Main-course</option>
                        <option value="dessert">Dessert</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="recipe_time">Time (mins):</label>
                    <input id="recipe_time" type="number" required>
                </div>

                <div class="form-row">
                    <label for="recipe_calories">Calories (kcal):</label>
                    <input id="recipe_calories" type="number" required>
                </div>

                <hr>
                <h2>Ingredients</h2>

                <div class="ingredient_group">
                    <label>ID:</label> <input type="number" name="ingredient id">
                    <label>Name:</label> <input type="text" name="ingredient name">
                    <label>Qty:</label> <input type="text" name="ingredient quantity">
                </div>

                <div class="ingredient_group">
                    <label>ID:</label> <input type="number" name="ingredient id">
                    <label>Name:</label> <input type="text" name="ingredient name">
                    <label>Qty:</label> <input type="text" name="ingredient quantity">
                </div>

                <div class="ingredient_group">
                    <label>ID:</label> <input type="number" name="ingredient id">
                    <label>Name:</label> <input type="text" name="ingredient name">
                    <label>Qty:</label> <input type="text" name="ingredient quantity">
                </div>

                <hr>
                <div class="description_section">
                    <label for="recipe_ingredients">Ingredients (Separator with commas):</label>
                    <textarea rows="3" id="recipe_ingredients" placeholder="e.g. Tomato, Lettuce, Olive Oil..."></textarea>
                </div>

                <hr>
                <div class="description_section">
                    <label for="discription">Recipe Description:</label>
                    <textarea rows="5" name="discription" id="discription"></textarea>
                </div>
                <div class="form-actions">
                    <input type="submit" value="Add Recipe" class="btn-main">
                    <input type="reset" value="Reset" class="btn-main" style="background: #ccc; border: none;">
                </div>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
